# Per-worktree isolated dev stack.
#
# Implements P0 #1 of docs/plans/2026-05/2026-05-07-docker-per-worktree-isolation-design.md.
# Lets multiple git worktrees run a full self-contained stack
# (postgres + backend + vite + BFF + redis) at the same time without
# colliding on shared singletons (DB, ~/.m2, :6443, :5174:3501, :6379).
#
# Differences from docker-compose.ga-e2e.override.yml:
#   - Host ports are env-var parameterized so multiple stacks can coexist
#     (`scripts/dev/start-isolated.sh` derives offset from a per-worktree slug).
#   - Includes redis (the GA-E2E override didn't need it; isolated dev does).
#   - Drops the ga-e2e-runner service (Playwright runner is a separate concern;
#     see docker-compose.ga-e2e.override.yml when running E2E inside a stack).
#   - Frontend service kept as `isolated-frontend` so compose doesn't merge
#     this block into the base file's `frontend.build:` block.
#   - Keeps node_modules per stack, but uses host-backed, platform-scoped
#     dependency caches to avoid multi-worktree Docker VM disk blowups.
#   - Keeps the Playwright image out of the default frontend service. Use the
#     optional `playwright-runner` profile when CI-like browser verification
#     must run inside Linux.
#
# Usage:
#   scripts/dev/start-isolated.sh                 # auto slug from branch
#   scripts/dev/start-isolated.sh --slug=my-poc   # override slug
#   scripts/dev/stop-isolated.sh --slug=my-poc    # tear down
#
# Direct compose usage (advanced):
#   COMPOSE_PROJECT_NAME=auraboot-mypoc \
#   PG_PORT=5440 BE_PORT=6451 VITE_PORT=5181 BFF_PORT=3508 REDIS_PORT=6486 \
#     docker compose -f docker-compose.yml -f docker-compose.isolated.yml \
#       --profile full --profile cache up -d

services:
  postgres:
    container_name: ${COMPOSE_PROJECT_NAME:-auraboot}-postgres
    # Compose merges list-typed fields by appending. !override replaces the
    # base file's "5432:5432" mapping so each stack can claim a unique host port.
    ports: !override
      - "${PG_PORT:-5433}:5432"
    deploy:
      resources:
        limits:
          cpus: '${PG_CPUS:-0.5}'
          memory: ${PG_MEM:-512m}

  redis:
    # Force redis on (base file gates it behind `cache` profile so it's
    # otherwise skipped on `docker compose up` without --profile cache).
    profiles: !override
      - full
      - cache
      - isolated
    container_name: ${COMPOSE_PROJECT_NAME:-auraboot}-redis
    ports: !override
      - "${REDIS_PORT:-6479}:6379"
    deploy:
      resources:
        limits:
          cpus: '${REDIS_CPUS:-0.25}'
          memory: ${REDIS_MEM:-256m}

  minio:
    container_name: ${COMPOSE_PROJECT_NAME:-auraboot}-minio
    ports: !override
      - "${MINIO_API_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    deploy:
      resources:
        limits:
          cpus: '${MINIO_CPUS:-0.5}'
          memory: ${MINIO_MEM:-512m}

  backend:
    container_name: ${COMPOSE_PROJECT_NAME:-auraboot}-backend
    profiles:
      - isolated
    build:
      dockerfile: ${ISOLATED_BACKEND_DOCKERFILE:-Dockerfile}
    # Per-container resource cap so concurrent isolated stacks don't fight
    # for the Docker Desktop VM's RAM/CPU budget. Tunable via env if a
    # specific worktree needs more (e.g. heavy plugin import).
    deploy:
      resources:
        limits:
          cpus: '${BE_CPUS:-2.0}'
          memory: ${BE_MEM:-2g}
    ports: !override
      - "${BE_PORT:-6444}:6443"
    volumes:
      # Mount this worktree's plugins read-only so import-directory-sync
      # can resolve absolute paths like /app/plugins/<name>.
      - ./plugins:/app/plugins:ro
      # Optional enterprise plugins. Pass ENTERPRISE_PLUGINS_DIR explicitly;
      # otherwise start-isolated.sh mounts an empty directory for OSS-only stacks.
      - ${ENTERPRISE_PLUGINS_DIR:-./.aura-stack/empty-enterprise-plugins}:/app/plugins-enterprise:ro
      # Optional enterprise PF4J backend handler jars. Config imports validate
      # command handlers before resource import, so handler jars must be loaded
      # at backend startup rather than discovered from JSON plugin directories.
      - ${ENTERPRISE_PLUGIN_JARS_DIR:-./.aura-stack/empty-enterprise-plugin-jars}:/app/plugin-jars:ro
      # Host-backed cross-stack caches. Keep dependency caches out of the
      # Docker VM so full isolated stacks don't consume VM disk for warm cache.
      - ${AURA_CONTAINER_CACHE_ROOT:-${HOME}/.cache/auraboot/container-linux}/gradle:/gradle-cache
      - ${AURA_CONTAINER_CACHE_ROOT:-${HOME}/.cache/auraboot/container-linux}/m2:/m2-cache
    environment:
      # Talk to the redis container by service name (works because both are
      # in the same compose project network).
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      # Phase 2.4 of bootstrap-unified: removed the
      # AURABOOT_BOOTSTRAP_ENABLED=false override. The Phase 2.3
      # BootstrapStartupRunner is idempotent and produces the same
      # 9-invariant state as /api/bootstrap/setup (System + Business
      # tenant + platform_admin role + grant), so isolated stacks can
      # auto-bootstrap on first start just like the host stack. The
      # tests/api/setup/00-bootstrap.spec.ts contract test still runs as
      # an idempotent verification of the 9 invariants.
      # Activate `test` profile alongside `community` so test-only beans
      # register on the isolated stack:
      #   - TestUserSpoofFilter (X-Test-Spoof-User-Id header support)
      #   - TestFixtureController + TestSeedController test endpoints
      # This unblocks the user-soul-profile real-backend specs (PR-80)
      # which spoof per-test user identities to avoid the shared-admin
      # uq_user_soul_profile_active collision. Host workflow keeps the
      # default community profile via base docker-compose.yml.
      SPRING_PROFILES_ACTIVE: community,test
      # Optional deterministic LLM for isolated E2E/API tests that need to
      # exercise the chat transport and tool runtime without real provider
      # credentials. Defaults off so regular isolated stacks keep production
      # provider semantics unless the operator opts in.
      AGENT_LLM_STUB_MODE: ${AGENT_LLM_STUB_MODE:-false}
      # AuraPluginManager scans this directory on startup and bridges PF4J
      # CommandHandlerExtension implementations into the import-time registry.
      AURA_PLUGINS_DIR: /app/plugin-jars
      # CORS allow-list covers the in-container hostnames plus host-mapped
      # variants. Frontend host ports are env-var driven for parity.
      FRONTEND_BASE_URL: http://localhost:${VITE_PORT:-5174}
      CORS_ALLOWED_ORIGINS: "http://isolated-frontend:5173,http://isolated-frontend:3500,http://localhost:${VITE_PORT:-5174},http://127.0.0.1:${VITE_PORT:-5174},http://localhost:${BFF_PORT:-3501},http://127.0.0.1:${BFF_PORT:-3501}"
      # Keep Docker health tied to service readiness. Disk capacity is checked
      # at host/Docker level by scripts/dev/doctor-disk.sh; Spring's diskspace
      # health can false-negative on Docker Desktop overlay filesystems.
      MANAGEMENT_HEALTH_DISKSPACE_ENABLED: "false"

  # Vite + BFF dev server. Distinct service name (`isolated-frontend`,
  # not `frontend`) so compose doesn't merge the base file's `frontend.build:`
  # block into us — we want dev mode (pnpm dev:full), not the prod build.
  isolated-frontend:
    image: ${ISOLATED_FRONTEND_IMAGE:-node:22-bookworm-slim}
    container_name: ${COMPOSE_PROJECT_NAME:-auraboot}-frontend
    user: root
    profiles:
      - isolated
    deploy:
      resources:
        limits:
          # 2026-05-08: bumped from 1 CPU / 1 GB → 2 CPU / 2 GB so vite/BFF
          # don't choke under playwright's 4-worker default. Triage data:
          # full-suite r2 run with 1c/1g produced 221 fail, almost all
          # `page.goto` / `apiRequestContext.post` timeouts — the container
          # was getting starved while spec workers competed. Bump still
          # leaves 4 stacks fitting in a 16 GB Docker VM.
          cpus: '${FE_CPUS:-2.0}'
          memory: ${FE_MEM:-2g}
    working_dir: /repo/web-admin
    ports:
      - "${VITE_PORT:-5174}:5173"
      - "${BFF_PORT:-3501}:3500"
    environment:
      SPRING_BOOT_URL: http://backend:6443
      BFF_PORT: "3500"
      VITE_PORT: "5173"
      VITE_ALLOWED_HOSTS: "isolated-frontend,localhost,127.0.0.1"
      HOST: "0.0.0.0"
      CI: "true"
      NODE_ENV: development
      PNPM_STORE_DIR: /pnpm-store
      # SSR fetch base URL — without this, http-client falls back to the
      # incoming origin (the host port, unreachable from inside the container)
      # and SSR /login submits fail with ECONNREFUSED. 127.0.0.1 (not
      # localhost) avoids ::1 IPv6-first resolution on Alpine/Debian.
      BFF_INTERNAL_URL: http://127.0.0.1:3500
      PUPPETEER_SKIP_DOWNLOAD: "true"
      OSS_PLUGIN_ROOT: /app/plugins
      ENTERPRISE_PLUGIN_ROOT: /app/plugins-enterprise
      http_proxy: ${AURA_DOCKER_HTTP_PROXY:-}
      https_proxy: ${AURA_DOCKER_HTTPS_PROXY:-}
      HTTP_PROXY: ${AURA_DOCKER_HTTP_PROXY:-}
      HTTPS_PROXY: ${AURA_DOCKER_HTTPS_PROXY:-}
      npm_config_proxy: ${AURA_DOCKER_HTTP_PROXY:-}
      npm_config_https_proxy: ${AURA_DOCKER_HTTPS_PROXY:-}
      npm_config_registry: ${AURA_DOCKER_NPM_REGISTRY:-}
    volumes:
      - ./:/repo:cached
      # Keep Linux node_modules project-local for correctness, but share the
      # content-addressed package store and browser cache across stacks.
      - isolated_node_modules:/repo/node_modules
      - isolated_web_admin_node_modules:/repo/web-admin/node_modules
      - ${AURA_CONTAINER_CACHE_ROOT:-${HOME}/.cache/auraboot/container-linux}/pnpm-store:/pnpm-store
    depends_on:
      backend:
        condition: service_healthy
    command: >-
      sh -c "
      set -e;
      bash /repo/scripts/ga-e2e-prepare-deps.sh /repo;
      cd web-admin;
      sh ../scripts/sync-platform-plugins.sh;
      node ../scripts/generate-plugin-routes.mjs;
      pnpm exec concurrently --names 'web,bff' --prefix-colors 'cyan,green' --restart-tries 5 --restart-after 2000 'pnpm dev:web' 'pnpm dev:bff'
      "
    healthcheck:
      test: ["CMD-SHELL", "node -e \"Promise.all([fetch('http://127.0.0.1:5173'), fetch('http://127.0.0.1:3500/health').catch(() => fetch('http://127.0.0.1:3500'))]).then(r => process.exit(r.every(x => x.ok || x.status < 500) ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5m

  # Production-like frontend for B2 pre-merge validation. This is separate
  # from the default Vite+BFF dev surface so daily full-stack smoke stays
  # lightweight; enable the `production-like` profile only when validating
  # the built React app + production BFF runtime path.
  isolated-prod-frontend:
    build:
      context: .
      dockerfile: web-admin/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-auraboot}-prod-frontend
    profiles:
      - production-like
    deploy:
      resources:
        limits:
          cpus: '${PROD_FE_CPUS:-2.0}'
          memory: ${PROD_FE_MEM:-2g}
    ports:
      - "${PROD_FRONTEND_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      BFF_PORT: "3000"
      SPRING_BOOT_URL: http://backend:6443
      CORS_ALLOWED_ORIGINS: "http://localhost:${PROD_FRONTEND_PORT:-3001},http://127.0.0.1:${PROD_FRONTEND_PORT:-3001}"
      SESSION_SECRET: ${SESSION_SECRET:-isolated-dev-session-secret}
      NO_PROXY: "localhost,127.0.0.1,backend"
      no_proxy: "localhost,127.0.0.1,backend"
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      http_proxy: ${AURA_DOCKER_HTTP_PROXY:-}
      https_proxy: ${AURA_DOCKER_HTTPS_PROXY:-}
      HTTP_PROXY: ${AURA_DOCKER_HTTP_PROXY:-}
      HTTPS_PROXY: ${AURA_DOCKER_HTTPS_PROXY:-}
      npm_config_proxy: ${AURA_DOCKER_HTTP_PROXY:-}
      npm_config_https_proxy: ${AURA_DOCKER_HTTPS_PROXY:-}
      npm_config_registry: ${AURA_DOCKER_NPM_REGISTRY:-}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').catch(() => fetch('http://127.0.0.1:3000/')).then(r => process.exit(r.ok || r.status < 500 ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 2m

  # Optional Linux Playwright runner. This service is intentionally not part
  # of the default isolated stack; run it only when CI-like browser validation
  # is needed:
  #   docker compose -p <project> -f docker-compose.yml -f docker-compose.isolated.yml \
  #     --profile isolated --profile cache --profile playwright-runner \
  #     run --rm playwright-runner
  playwright-runner:
    image: ${PLAYWRIGHT_RUNNER_IMAGE:-mcr.microsoft.com/playwright:v1.59.1-noble}
    container_name: ${COMPOSE_PROJECT_NAME:-auraboot}-playwright-runner
    profiles:
      - playwright-runner
    working_dir: /repo/web-admin
    environment:
      CI: "true"
      NODE_ENV: test
      PNPM_STORE_DIR: /pnpm-store
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      PLAYWRIGHT_BASE_URL: http://isolated-frontend:5173
      BASE_URL: http://isolated-frontend:5173
      BACKEND_URL: http://backend:6443
      BFF_URL: http://isolated-frontend:3500
      PW_SKIP_WEBSERVER: "1"
      PW_PROFILE: full
      PW_WORKERS: "1"
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: auraboot
      PGPASSWORD: auraboot_dev
      PGDATABASE: aura_boot
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: auraboot
      PG_PASSWORD: auraboot_dev
      PG_DB: aura_boot
      OSS_PLUGIN_ROOT: /app/plugins
      ENTERPRISE_PLUGIN_ROOT: /app/plugins-enterprise
      PW_E2E_RUN_ID: ${PW_E2E_RUN_ID:-docker}
      PW_E2E_RUN_ROOT: ${PW_E2E_RUN_ROOT:-test-results/runs/isolated/docker}
      PW_ARTIFACT_DIR: ${PW_ARTIFACT_DIR:-test-results/runs/isolated/docker/artifacts}
      PW_REPORT_DIR: ${PW_REPORT_DIR:-test-results/runs/isolated/docker/html-report}
      PW_RESULTS_JSON: ${PW_RESULTS_JSON:-test-results/runs/isolated/docker/results.json}
      PW_STORAGE_DIR: ${PW_STORAGE_DIR:-tests/storage/isolated/docker}
      PW_ADMIN_STORAGE_STATE: ${PW_ADMIN_STORAGE_STATE:-${PW_STORAGE_DIR:-tests/storage/isolated/docker}/admin.json}
      PW_OPERATOR_STORAGE_STATE: ${PW_OPERATOR_STORAGE_STATE:-${PW_STORAGE_DIR:-tests/storage/isolated/docker}/operator.json}
      PW_VIEWER_STORAGE_STATE: ${PW_VIEWER_STORAGE_STATE:-${PW_STORAGE_DIR:-tests/storage/isolated/docker}/viewer.json}
      NO_PROXY: "localhost,127.0.0.1,isolated-frontend,backend"
      no_proxy: "localhost,127.0.0.1,isolated-frontend,backend"
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
    volumes:
      - ./:/repo:cached
      - runner_node_modules:/repo/node_modules
      - runner_web_admin_node_modules:/repo/web-admin/node_modules
      - ${AURA_CONTAINER_CACHE_ROOT:-${HOME}/.cache/auraboot/container-linux}/pnpm-store:/pnpm-store
      - ${AURA_CONTAINER_CACHE_ROOT:-${HOME}/.cache/auraboot/container-linux}/ms-playwright:/ms-playwright
      - ./plugins:/app/plugins:ro
      - ${ENTERPRISE_PLUGINS_DIR:-./.aura-stack/empty-enterprise-plugins}:/app/plugins-enterprise:ro
    depends_on:
      backend:
        condition: service_healthy
      isolated-frontend:
        condition: service_healthy
    command: >-
      sh -c "
      set -e;
      bash /repo/scripts/ga-e2e-prepare-deps.sh /repo;
      cd web-admin;
      mkdir -p \"$$PW_ARTIFACT_DIR\" \"$$PW_REPORT_DIR\" \"$$(dirname \"$$PW_RESULTS_JSON\")\" \"$$PW_STORAGE_DIR\";
      pnpm exec playwright install chromium;
      sh -c \"${PLAYWRIGHT_RUNNER_COMMAND:-pnpm exec playwright test -c playwright.noweb.config.ts --reporter=line}\"
      "

volumes:
  # Each compose project gets its own isolated volume namespace already
  # (docker prefixes volumes with project name), so no manual suffixing here.
  isolated_node_modules:
  isolated_web_admin_node_modules:
  runner_node_modules:
  runner_web_admin_node_modules:

# GA Follow-up E2E override - fully isolated backend + postgres + frontend.
#
# Goals:
#   - Run a clean OSS test stack without colliding with developers' local
#     bootRun (6443), postgres (5432), or vite/BFF (5173/3500).
#   - Use COMPOSE_PROJECT_NAME=auraboot-ga-e2e for distinct volumes/network/
#     containers so down + up cycles don't touch other compose stacks.
#   - Make the host work disturbance ZERO: the operator can run Playwright
#     against this stack while their own dev server keeps running.
#
# Frontend service notes:
#   The base web-admin/Dockerfile uses `npm ci && npm run build`, but the
#   build script chains `pnpm sync-plugins` and pnpm is not present in
#   node:18-alpine. Rather than rebuild the prod image, we run the SAME
#   dev-mode pnpm flow that developers use (vite + BFF), inside a
#   bind-mounted node:20-alpine container. This keeps the OSS Dockerfile
#   debt out of scope while still giving us full container isolation.
#
# Usage (from this worktree root):
#   ./scripts/docker-ga-e2e-up.sh
#   ./scripts/docker-ga-e2e-down.sh
#   ./scripts/docker-ga-e2e-logs.sh [backend|frontend|postgres]
#
# Host ports:
#   postgres : 5433 -> 5432
#   backend  : 6444 -> 6443
#   vite     : 5174 -> 5173
#   BFF      : 3501 -> 3500

services:
  postgres:
    container_name: auraboot-ga-e2e-postgres
    # Compose merges list-typed fields by appending. Use !override to replace
    # the base file's "5432:5432" mapping (which would conflict with the dev's
    # local postgres on 5432) with our isolated 5433.
    ports: !override
      - "5433:5432"

  # Redis — required by aurabot skill stores (PreviewTokenStore +
  # SkillIdempotencyStore wire StringRedisTemplate as a hard constructor dep,
  # so the backend ApplicationContext fails to start without it). Base
  # docker-compose.yml has redis under profile [cache] and exposes 6379;
  # we override here with: (a) joining the ga-e2e-stack profile so it comes
  # up with the rest of the stack, (b) isolated host port 6380 to avoid
  # colliding with developers' local redis on 6379, (c) container name
  # under our COMPOSE_PROJECT_NAME.
  redis:
    profiles: !override
      - ga-e2e-stack
    container_name: auraboot-ga-e2e-redis
    ports: !override
      - "6380:6379"

  backend:
    container_name: auraboot-ga-e2e-backend
    # Compose appends profile lists; this gives backend [full, ga-e2e-stack].
    profiles:
      - ga-e2e-stack
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    build:
      dockerfile: ${GA_E2E_BACKEND_DOCKERFILE:-Dockerfile}
    ports:
      - "6444:6443"
    volumes:
      # Mount the worktree's plugins read-only so import-directory-sync
      # can resolve absolute paths like /app/plugins/<name>.
      - ./plugins:/app/plugins:ro
      # Optional: mount the sibling enterprise repo's plugins so the same
      # endpoint can reach /app/plugins-enterprise/<name>. Path resolved
      # relative to this compose file's directory; the bind silently
      # no-ops if the sibling worktree is absent (Docker creates an empty
      # source dir at first up — operator can then either populate or
      # comment this volume out).
      - ../auraboot-enterprise/plugins:/app/plugins-enterprise:ro
      # PF4J plugin backend jars (built by `gradle :plugins:<name>:backend:jar`
      # under each plugin and copied to auraboot-enterprise/build/plugin-jars/).
      # AuraPluginManager scans this dir at startup and loads each *.jar as a
      # PF4J plugin, registering @Extension impls into ExtensionRegistry.
      # Design: auraboot-enterprise/docs/plans/2026-05/2026-05-08-pf4j-plugin-backend-loading-design.md
      - ../auraboot-enterprise/build/plugin-jars:/app/plugin-jars:ro
    environment:
      # Activate `test` profile alongside `community` so the
      # TestUserSpoofFilter (and any other @Profile("test") beans the OSS
      # E2E suite expects) gets registered. Specs like aurabot
      # ai-user-soul-profile-real.spec.ts use `X-Test-Spoof-User-Id` to
      # impersonate a synthetic user whose seeded rows must be visible to
      # the admin session; without `test` profile the filter is absent
      # and the header is silently ignored.
      SPRING_PROFILES_ACTIVE: community,test
      # CORS allow-list covers the in-container vite/BFF host plus the
      # host-mapped variants (5174/3501) that Playwright targets.
      FRONTEND_BASE_URL: http://localhost:5174
      CORS_ALLOWED_ORIGINS: "http://ga-e2e-frontend:5173,http://ga-e2e-frontend:3500,http://localhost:5174,http://127.0.0.1:5174,http://localhost:3501,http://127.0.0.1:3501,http://localhost:5173,http://localhost:3500"
      # AuraPluginManager pluginsRoot (overrides the default `plugins/` which
      # we use for JSON resource directories instead).
      AURA_PLUGINS_DIR: /app/plugin-jars
      # Redis — application.yml says "Redis is optional, set
      # SPRING_DATA_REDIS_HOST to enable", but the aurabot skill module
      # (PreviewTokenStore + SkillIdempotencyStore) constructor-injects
      # StringRedisTemplate as a hard dep. Without these env vars the
      # backend ApplicationContext fails to start. Hostname `redis` resolves
      # via the compose network.
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      # Test fixtures — the internal `test-fixtures` plugin under
      # plugins/test-fixtures/ provides the `e2et_*` model/page/command set
      # that ~100+ OSS specs depend on (action-system, activity, data-tools,
      # permission, saved-view, model-test-helper-driven specs). It is gated
      # by IMPORT_TEST_FIXTURES=true (or AURA_ENV=test); without this flag
      # all e2et:* commands return "Command not found" and any spec that
      # uses ModelTestHelper(e2et) fails its beforeAll.
      IMPORT_TEST_FIXTURES: "true"

  # Vite + BFF dev server in a browser-capable Node container.
  # We do NOT use web-admin/Dockerfile because it bakes a prod build via
  # `npm run build` while E2E needs the same dev-mode flow developers use:
  # bind-mount the source and run `pnpm dev:full` directly.
  #
  # Distinct service name (`ga-e2e-frontend`, not `frontend`) so compose
  # does not merge the base file's `frontend.build:` block into us.
  ga-e2e-frontend:
    # Reuse the Playwright image already needed by the runner. It includes
    # bash/git/corepack, so startup does not depend on runtime apk/apt calls.
    image: ${GA_E2E_FRONTEND_IMAGE:-mcr.microsoft.com/playwright:v1.59.1-noble}
    container_name: auraboot-ga-e2e-frontend
    user: root
    profiles:
      - ga-e2e-stack
    working_dir: /repo/web-admin
    ports:
      - "5174:5173"   # vite
      - "3501:3500"   # BFF
    environment:
      # BFF talks to the backend service on the docker network.
      SPRING_BOOT_URL: http://backend:6443
      BFF_PORT: "3500"
      VITE_PORT: "5173"
      VITE_ALLOWED_HOSTS: "ga-e2e-frontend,localhost,127.0.0.1"
      # Vite needs to bind 0.0.0.0 inside the container for the host port
      # mapping to work; the dev script honors HOST.
      HOST: "0.0.0.0"
      # CI mode for vite to avoid interactive prompts if any.
      CI: "true"
      NODE_ENV: development
      PNPM_STORE_DIR: /pnpm-store
      # SSR-side fetch base URL. Without this, app/shared/services/http-client
      # falls back to "use the incoming request origin", which becomes the
      # host port (5174) - unreachable from inside the container - so SSR
      # actions like the /login form submit fail with ECONNREFUSED. Use
      # 127.0.0.1 instead of localhost because Alpine resolves localhost to
      # ::1 first while the dev BFF binds IPv4.
      BFF_INTERNAL_URL: http://127.0.0.1:3500
      PUPPETEER_SKIP_DOWNLOAD: "true"
    volumes:
      # Bind-mount the whole repo so workspace deps + plugins resolve and
      # hot-reload works the same way as host-mode dev.
      - ./:/repo:cached
      # Use a named volume for node_modules so the host's macOS pnpm store
      # does not leak into the container (osxfs perf + symlink quirks).
      - ga_e2e_node_modules:/repo/node_modules
      - ga_e2e_web_admin_node_modules:/repo/web-admin/node_modules
      - ga_e2e_pnpm_store:/pnpm-store
    depends_on:
      backend:
        condition: service_healthy
    # Install deps at boot (idempotent; pnpm fast-path when lockfile matches),
    # then run vite + BFF concurrently. Keep stdout for `docker compose logs`.
    command: >-
      sh -c "
      set -e;
      bash /repo/scripts/ga-e2e-prepare-deps.sh /repo;
      cd /repo/web-admin;
      sh ../scripts/sync-platform-plugins.sh;
      node ../scripts/generate-plugin-routes.mjs;
      pnpm exec concurrently --names 'web,bff' --prefix-colors 'cyan,green' --restart-tries 5 --restart-after 2000 'pnpm dev:web' 'pnpm dev:bff'
      "
    # Generous start period - first install can take a few minutes when the
    # node_modules volume is empty.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:5173 >/dev/null 2>&1 && wget -q -O- http://127.0.0.1:3500/health >/dev/null 2>&1 || wget -q -O- http://127.0.0.1:3500 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5m

  # Playwright runner for GA showcase gates.
  #
  # Use the official Playwright image instead of the frontend's Alpine node
  # container. The runner needs browser system dependencies and Linux-gnu node
  # package binaries, so it gets its own node_modules/pnpm volumes.
  # The image tag is overridable; the default matches pnpm-lock's Playwright
  # version and reuses the image's baked /ms-playwright browsers.
  ga-e2e-runner:
    image: ${GA_E2E_RUNNER_IMAGE:-mcr.microsoft.com/playwright:v1.59.1-noble}
    container_name: auraboot-ga-e2e-runner
    profiles:
      - ga-e2e-runner
    working_dir: /repo
    environment:
      CI: "true"
      PLAYWRIGHT_BASE_URL: http://ga-e2e-frontend:5173
      BASE_URL: http://ga-e2e-frontend:5173
      BACKEND_URL: http://backend:6443
      PW_SKIP_WEBSERVER: "1"
      PW_STORAGE_DIR: tests/storage/ga-docker
      PW_ADMIN_STORAGE_STATE: tests/storage/ga-docker/admin.json
      PW_OPERATOR_STORAGE_STATE: tests/storage/ga-docker/operator.json
      PW_VIEWER_STORAGE_STATE: tests/storage/ga-docker/viewer.json
      NO_PROXY: "localhost,127.0.0.1,ga-e2e-frontend,backend"
      no_proxy: "localhost,127.0.0.1,ga-e2e-frontend,backend"
      PNPM_STORE_DIR: /pnpm-store
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      GA_E2E_SKIP_BROWSER_INSTALL: "1"
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
    volumes:
      - ./:/repo:cached
      - ga_e2e_runner_node_modules:/repo/node_modules
      - ga_e2e_runner_web_admin_node_modules:/repo/web-admin/node_modules
      - ga_e2e_runner_pnpm_store:/pnpm-store
    depends_on:
      backend:
        condition: service_healthy
      ga-e2e-frontend:
        condition: service_healthy

volumes:
  ga_e2e_node_modules:
  ga_e2e_web_admin_node_modules:
  ga_e2e_pnpm_store:
  ga_e2e_runner_node_modules:
  ga_e2e_runner_web_admin_node_modules:
  ga_e2e_runner_pnpm_store:

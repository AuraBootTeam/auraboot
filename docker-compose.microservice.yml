# ============================================================
# Docker Compose — Microservice mode
# ============================================================
# Each bounded context runs in its own container, communicating
# via Redis Streams for events and direct HTTP for sync calls.
#
# Usage: docker compose -f docker-compose.microservice.yml up -d
# ============================================================

version: '3.8'

x-service-defaults: &service-defaults
  build:
    context: ./platform
    dockerfile: Dockerfile
  environment: &service-env
    SPRING_PROFILES_ACTIVE: microservice
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-aura_boot}
    SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
    SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
    SPRING_DATA_REDIS_HOST: redis
    REDIS_HOST: redis
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - aura-network
  restart: unless-stopped
  deploy:
    resources:
      limits:
        memory: 512M

services:

  # ── Shared infrastructure ──────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: aura-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-aura_boot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aura-network

  redis:
    image: redis:7-alpine
    container_name: aura-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["cmd", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aura-network

  # ── Observability ──────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: aura-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus-microservice.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - aura-network

  grafana:
    image: grafana/grafana:10.4.1
    container_name: aura-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - aura-network

  # ── API Gateway ────────────────────────────────────────────

  gateway:
    image: nginx:1.25-alpine
    container_name: aura-gateway
    ports:
      - "6443:6443"
    volumes:
      - ./docker/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - meta-core
      - biz-runtime
      - bpm-engine
      - im-service
      - agent-runtime
    networks:
      - aura-network

  # ── Service: meta-core ─────────────────────────────────────
  # Schema management, model registry, field definitions, DSL engine

  meta-core:
    <<: *service-defaults
    container_name: aura-meta-core
    environment:
      <<: *service-env
      AURA_MODULES_META_CORE: "true"
      SERVER_PORT: "6501"
    ports:
      - "6501:6501"

  # ── Service: biz-runtime ───────────────────────────────────
  # Dynamic CRUD, command execution, business logic, plugins

  biz-runtime:
    <<: *service-defaults
    container_name: aura-biz-runtime
    environment:
      <<: *service-env
      AURA_MODULES_BIZ_RUNTIME: "true"
      SERVER_PORT: "6502"
    ports:
      - "6502:6502"

  # ── Service: bpm-engine ────────────────────────────────────
  # Workflow definitions, process instances, task management

  bpm-engine:
    <<: *service-defaults
    container_name: aura-bpm-engine
    environment:
      <<: *service-env
      AURA_MODULES_BPM_ENGINE: "true"
      SERVER_PORT: "6503"
    ports:
      - "6503:6503"

  # ── Service: im-service ────────────────────────────────────
  # Instant messaging, WebSocket, conversations, messages

  im-service:
    <<: *service-defaults
    container_name: aura-im-service
    environment:
      <<: *service-env
      AURA_MODULES_IM_SERVICE: "true"
      SERVER_PORT: "6504"
    ports:
      - "6504:6504"

  # ── Service: agent-runtime ─────────────────────────────────
  # AI agents, LLM providers, AuraBot, RAG, tool execution

  agent-runtime:
    <<: *service-defaults
    container_name: aura-agent-runtime
    environment:
      <<: *service-env
      AURA_MODULES_AGENT_RUNTIME: "true"
      SERVER_PORT: "6505"
    ports:
      - "6505:6505"

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  aura-network:
    driver: bridge

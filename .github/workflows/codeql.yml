name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly run on Mondays at 09:00 UTC — catches newly-published vuln rules
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, javascript-typescript]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (for Java analysis)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # build-mode: manual lets us provide the build command explicitly.
          # autobuild fails on multi-module Gradle layouts where the root is
          # in platform/ rather than the repo root.
          build-mode: ${{ matrix.language == 'java-kotlin' && 'manual' || 'none' }}
          # security-extended pack for stricter coverage; drop back to
          # default if false-positive volume becomes painful in beta.
          queries: security-extended

      - name: Build (Java only — CodeQL build-mode=manual)
        if: matrix.language == 'java-kotlin'
        working-directory: ./platform
        run: |
          chmod +x gradlew
          # CodeQL needs compiled classes, not distributable jars. Keep the
          # manual build on source compilation so provider packaging tasks do
          # not trip Gradle implicit-dependency validation during analysis.
          ./gradlew clean compileJava compileTestJava compileIntegrationTestJava -x test --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

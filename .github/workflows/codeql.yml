name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly run on Mondays at 09:00 UTC — catches newly-published vuln rules
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, javascript-typescript]

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21 (for Java analysis)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Initialize CodeQL (Java)
        if: matrix.language == 'java-kotlin'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # build-mode: manual lets us provide the build command explicitly.
          # autobuild fails on multi-module Gradle layouts where the root is
          # in platform/ rather than the repo root.
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml
          packs: aurabootteam/aura-java-models@0.1.0

      - name: Initialize CodeQL (JavaScript/TypeScript)
        if: matrix.language == 'javascript-typescript'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build (Java only — CodeQL build-mode=manual)
        if: matrix.language == 'java-kotlin'
        working-directory: ./platform
        run: |
          chmod +x gradlew
          # CodeQL only needs compiled classes. `assemble` also runs bootJar,
          # which can race Gradle's implicit dependency validation for the
          # provider modules that compileOnly-depend on the root project.
          # Disable Gradle's build cache so CodeQL observes javac execution
          # instead of receiving an empty database from cache hits.
          ./gradlew clean classes -x test --no-daemon --no-build-cache

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

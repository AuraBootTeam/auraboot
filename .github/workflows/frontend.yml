name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'web-admin/**'
      - 'packages/**'
      - 'plugins/**/config/dashboards/**'
      - 'plugins/schemas/dashboards.schema.json'
      - 'scripts/validate-plugin-dashboards.mjs'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web-admin/**'
      - 'packages/**'
      - 'plugins/**/config/dashboards/**'
      - 'plugins/schemas/dashboards.schema.json'
      - 'scripts/validate-plugin-dashboards.mjs'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/frontend.yml'

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint / Type-check / Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build:packages

      - name: Lint web-admin
        working-directory: web-admin
        run: pnpm lint

      - name: Env-drift gate (tests/)
        working-directory: web-admin
        run: pnpm test:env-lint

      - name: Type-check web-admin
        working-directory: web-admin
        run: pnpm typecheck

      - name: Unit tests (vitest)
        working-directory: web-admin
        run: pnpm test:unit

      - name: Validate dashboard contracts
        run: node scripts/validate-plugin-dashboards.mjs

name: Permission Codes CI

# Strict-mode gate (Phase 6 of permission-code-naming reconciliation,
# auraboot-enterprise/docs/standards/meta/permission-code-naming.md):
# every permission-code reference must resolve to a registered code.
# Baseline mode was used during reconciliation phases 1-5 while the
# 174 historical drift hits were being cleared; with that done, the
# validator runs strict (no --baseline) so any new drift fails CI
# immediately.
#
# Runs in --oss-only mode (OSS CI has no auraboot-enterprise checkout).

on:
  push:
    branches: [main]
    paths:
      - 'platform/src/main/java/com/auraboot/framework/permission/constants/**'
      - 'plugins/**/config/permissions.json'
      - 'plugins/**/config/menus.json'
      - 'platform/src/main/resources/tenant-templates/default-bootstrap.json'
      - 'web-admin/app/plugins/**/resources.ts'
      - 'scripts/validate-permission-codes.mjs'
      - '.github/workflows/permission-codes.yml'
  pull_request:
    branches: [main]
    paths:
      - 'platform/src/main/java/com/auraboot/framework/permission/constants/**'
      - 'plugins/**/config/permissions.json'
      - 'plugins/**/config/menus.json'
      - 'platform/src/main/resources/tenant-templates/default-bootstrap.json'
      - 'web-admin/app/plugins/**/resources.ts'
      - 'scripts/validate-permission-codes.mjs'
      - '.github/workflows/permission-codes.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: permission-codes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Permission code drift gate (strict)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Validate permission codes (strict — every reference must resolve)
        run: node scripts/validate-permission-codes.mjs --oss-only

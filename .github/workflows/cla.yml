name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Required permissions for CLA Assistant Lite to read PRs and write the
# signature record back to a separate repo (configured below).
permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    env:
      CLA_SIGNATURES_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
    steps:
      - name: CLA Assistant not configured
        if: env.CLA_SIGNATURES_TOKEN == ''
        run: |
          echo "::warning::CLA_SIGNATURES_TOKEN is not configured; skipping CLA Assistant."

      - name: CLA Assistant
        if: env.CLA_SIGNATURES_TOKEN != '' && (github.event_name == 'pull_request_target' || (github.event_name == 'issue_comment' && (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')))
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN must be configured in repo secrets — needs
          # 'repo' scope on the signatures repo (see path-to-signatures below).
          PERSONAL_ACCESS_TOKEN: ${{ env.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: 'signatures/v1/cla.json'
          path-to-document: 'https://github.com/AuraBootTeam/auraboot/blob/main/CLA.md'
          # Signatures are stored in a SEPARATE private repo so contributors
          # cannot tamper with the record via PRs to this repo.
          remote-organization-name: AuraBootTeam
          remote-repository-name: cla-signatures
          branch: 'main'
          allowlist: dependabot[bot],renovate[bot],github-actions[bot]
          # Comment text shown to first-time contributors:
          custom-pr-sign-comment: |
            I have read the CLA Document and I hereby sign the CLA
          custom-notsigned-prcomment: |
            👋 Thank you for your contribution!

            Before we can merge this pull request, we need you to sign our [Contributor License Agreement](https://github.com/AuraBootTeam/auraboot/blob/main/CLA.md).

            **Why?** AuraBoot is dual-licensed (community source-available + commercial). The CLA gives us the rights needed to distribute your contribution under both licenses. It does **not** transfer your copyright — you retain ownership of your work.

            **How to sign:** Reply to this PR with the following comment:
            > I have read the CLA Document and I hereby sign the CLA

            Once signed, your future PRs are auto-approved by the bot. Trivial fixes (typos, formatting) are exempt — see the [CLA document](https://github.com/AuraBootTeam/auraboot/blob/main/CLA.md#trivial-contributions) for details.

            Questions: license@auraboot.com
          custom-allsigned-prcomment: |
            ✅ All Contributors have signed the CLA. Thanks!

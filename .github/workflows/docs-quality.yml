name: Docs Quality Gate

# Docs-governance gate (lite profile): BLOCKING `--strict --git`. The
# post-anchor doc surface is clean (0/0); pre-anchor docs are grandfathered by
# baseline_anchor in .docs-governance.json. Any new/changed doc must carry valid
# frontmatter and live in a governed dir, or this gate fails.
# Vendored, self-contained checker — see scripts/check-docs-governance.mjs and
# the enterprise canonical docs/standards/meta/documentation-governance.md.

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - '.docs-governance.json'
      - 'scripts/check-docs-governance.mjs'
      - '.github/workflows/docs-quality.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.docs-governance.json'
      - 'scripts/check-docs-governance.mjs'
      - '.github/workflows/docs-quality.yml'

permissions:
  contents: read

concurrency:
  group: docs-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-quality:
    name: Docs Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so check-docs-governance.mjs --git can detect which
          # docs were added on/after the baseline_anchor (shallow clones can't).
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Docs governance (lite profile; strict, baseline-grandfathered)
        run: node scripts/check-docs-governance.mjs --strict --git

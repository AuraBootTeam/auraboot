name: Publish CodeQL Model Pack

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/codeql/aura-java-models/**'
      - '.github/workflows/codeql-model-pack.yml'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish aura-java-models
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL CLI
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin

      - name: Validate model pack
        run: |
          "${CODEQL_DIST}/codeql" version
          "${CODEQL_DIST}/codeql" pack install .github/codeql/aura-java-models

      - name: Publish model pack
        run: echo "${GITHUB_TOKEN}" | "${CODEQL_DIST}/codeql" pack publish .github/codeql/aura-java-models --github-auth-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

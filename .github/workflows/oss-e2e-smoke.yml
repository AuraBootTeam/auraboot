name: OSS E2E Smoke (scaffold — manual only)

# BACKLOG-CI-001: scaffolded smoke pipeline. Manual-trigger only until
# the prerequisites below are resolved.
#
# Prerequisites BEFORE enabling automatic PR/push triggers:
#   1. Frontend service in the GA-E2E docker stack — currently the stack
#      ships backend + postgres only because web-admin/Dockerfile uses
#      `npm ci && npm run build` while the build script chains
#      `pnpm sync-plugins` (pnpm not present in node:18-alpine). Either
#      fix the prod Dockerfile or add a CI step that boots vite/BFF on
#      the runner host before the playwright invocation.
#   2. `@smoke`-tagged specs split into UI-driven (need vite) vs.
#      API-driven so PW_PROFILE=smoke does not silently include specs
#      that ECONNREFUSED on :5174 when no frontend is up.
#   3. `oss-test.sh --oss-smoke` (referenced in BACKLOG-CI-001) does not
#      currently exist; today only `--smoke` is implemented. Decide
#      whether to add `--oss-smoke` or rename the backlog item.
#
# Until those land, this workflow is manual (`workflow_dispatch`) so
# operators can dry-run it from a PR branch and surface the gaps —
# without burning CI minutes on every push.

on:
  workflow_dispatch:

concurrency:
  group: oss-e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: OSS smoke regression
    runs-on: ubuntu-latest
    # Smoke set should always finish under 25 minutes; use the timeout as
    # a guard rail rather than a target.
    timeout-minutes: 30
    # Skip if a `skip-e2e` label is on the PR (escape hatch for doc-only
    # changes that already match the path filter).
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-e2e') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Recover gradle wrapper jar
        # The wrapper jar is .gitignored in this repo; the docker-ga-e2e
        # up.sh has the same recovery, but in CI we generate it via the
        # JDK install instead of copying from a sibling worktree.
        run: |
          if [ ! -f platform/gradle/wrapper/gradle-wrapper.jar ]; then
            cd platform
            gradle wrapper --gradle-version $(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | sed 's/.*gradle-\([0-9.]*\).*/\1/')
          fi

      - name: Bring up GA-E2E docker stack
        run: ./scripts/docker-ga-e2e-up.sh

      - name: Install Playwright browsers
        run: cd web-admin && pnpm exec playwright install --with-deps chromium

      - name: Run smoke regression
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5174
          # CI doesn't bring up a frontend container in this stack; the
          # smoke spec set is API-driven where possible. UI specs that
          # require the host vite are tagged @needs-host and excluded by
          # the smoke profile.
          PW_SKIP_WEBSERVER: '1'
        run: ./scripts/oss-test.sh --smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web-admin/playwright-report/
          retention-days: 7

      - name: Tear down docker stack
        if: always()
        run: ./scripts/docker-ga-e2e-down.sh --purge

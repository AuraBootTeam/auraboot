name: OSS Boundary Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  boundary-check:
    name: Verify OSS does not reference enterprise code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run OSS boundary check
        run: bash scripts/check-oss-boundary.sh

  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

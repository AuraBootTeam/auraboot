name: Docs CI

# A1 from docs/analysis/2026-04-30/04-action-plan-30-60-90.md (revised by 06):
# OSS main repo equivalent of enterprise's d7-knowledge-gate.
# Catches doc drift on the OSS side without needing enterprise checkout.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/check-docs.sh'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/check-docs.sh'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-docs:
    name: Documentation Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Make script executable
        run: chmod +x scripts/check-docs.sh

      - name: Run docs quality check (strict — dead links fail CI)
        run: bash scripts/check-docs.sh --strict

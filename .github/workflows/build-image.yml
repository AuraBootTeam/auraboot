name: Build & Publish OSS Image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/FUNDING.yml'
      - '.github/release-notes-template.md'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build, push ${{ matrix.name }} (multi-arch)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Backend: builds the boot jar and bakes the OSS config plugins so a
          # pure `docker pull` needs no repo checkout. Context is the repo root.
          - name: backend
            image: auraboot
            context: .
            file: platform/Dockerfile
          # Frontend: BFF + SSR. Context is the repo root (workspace packages).
          - name: frontend
            image: auraboot-frontend
            context: .
            file: web-admin/Dockerfile
          # Postgres: pgvector + baked schema.sql so first boot seeds the schema
          # without a repo checkout.
          - name: postgres
            image: auraboot-postgres
            context: .
            file: docker/postgres/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          # Tags:
          #   main → latest, sha-<short>
          #   v1.2.3 → 1.2.3, 1.2, 1, latest
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build & push ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Output image refs
        run: |
          echo "Pushed ${{ matrix.name }}:"
          echo "${{ steps.meta.outputs.tags }}"

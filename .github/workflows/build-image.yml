name: Build & Publish OSS Image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/FUNDING.yml'
      - '.github/release-notes-template.md'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

# Native per-arch build + manifest merge (no QEMU). amd64 builds on ubuntu-latest,
# arm64 builds on the free public ubuntu-24.04-arm runner. Emulating the frontend
# (pnpm/Vite) on arm64 via QEMU used to exceed GitHub's 6h job cap (issue #1270);
# native runners keep every build under ~15 min.
jobs:
  build:
    name: Build ${{ matrix.image }} (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        image: [backend, frontend, postgres]
        arch: [amd64, arm64]
    steps:
      - name: Resolve image ref + Dockerfile
        id: img
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"   # GHCR refs must be lowercase
          case "${{ matrix.image }}" in
            backend)  name=auraboot;          file=platform/Dockerfile ;;
            frontend) name=auraboot-frontend; file=web-admin/Dockerfile ;;
            postgres) name=auraboot-postgres; file=docker/postgres/Dockerfile ;;
          esac
          echo "image=${REGISTRY}/${owner}/${name}" >> "$GITHUB_OUTPUT"
          echo "file=${file}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ steps.img.outputs.file }}
          platforms: linux/${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}
          outputs: type=image,name=${{ steps.img.outputs.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge & tag ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        image: [backend, frontend, postgres]
    steps:
      - name: Resolve image ref
        id: img
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          case "${{ matrix.image }}" in
            backend)  name=auraboot ;;
            frontend) name=auraboot-frontend ;;
            postgres) name=auraboot-postgres ;;
          esac
          echo "image=${REGISTRY}/${owner}/${name}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.img.outputs.image }}
          # Tags:
          #   main → latest, sha-<short>
          #   v1.2.3 → 1.2.3, 1.2, 1, latest
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Create manifest list & push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.img.outputs.image }}@sha256:%s ' *)

      - name: Inspect published manifest
        run: |
          docker buildx imagetools inspect ${{ steps.img.outputs.image }}:${{ steps.meta.outputs.version }}

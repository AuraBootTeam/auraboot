name: Build & Publish OSS Image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/FUNDING.yml'
      - '.github/release-notes-template.md'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

# Native per-arch build + manifest merge (no QEMU). amd64 builds on ubuntu-latest,
# arm64 builds on the free public ubuntu-24.04-arm runner. Emulating the frontend
# (pnpm/Vite) on arm64 via QEMU used to exceed GitHub's 6h job cap (issue #1270);
# native runners keep every build under ~15 min.
jobs:
  build:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        image: [backend, frontend, postgres]
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Resolve image name + Dockerfile
        id: img
        run: |
          case "${{ matrix.image }}" in
            backend)  echo "name=auraboot"          >> "$GITHUB_OUTPUT"; echo "file=platform/Dockerfile"        >> "$GITHUB_OUTPUT" ;;
            frontend) echo "name=auraboot-frontend" >> "$GITHUB_OUTPUT"; echo "file=web-admin/Dockerfile"       >> "$GITHUB_OUTPUT" ;;
            postgres) echo "name=auraboot-postgres" >> "$GITHUB_OUTPUT"; echo "file=docker/postgres/Dockerfile" >> "$GITHUB_OUTPUT" ;;
          esac

      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ steps.img.outputs.file }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ steps.img.outputs.name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ matrix.platform == 'linux/arm64' && 'arm64' || 'amd64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge & tag ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        image: [backend, frontend, postgres]
    steps:
      - name: Resolve image name
        id: img
        run: |
          case "${{ matrix.image }}" in
            backend)  echo "name=auraboot"          >> "$GITHUB_OUTPUT" ;;
            frontend) echo "name=auraboot-frontend" >> "$GITHUB_OUTPUT" ;;
            postgres) echo "name=auraboot-postgres" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ steps.img.outputs.name }}
          # Tags:
          #   main → latest, sha-<short>
          #   v1.2.3 → 1.2.3, 1.2, 1, latest
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Create manifest list & push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ steps.img.outputs.name }}@sha256:%s ' *)

      - name: Inspect published manifest
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ steps.img.outputs.name }}:${{ steps.meta.outputs.version }}

name: ❓ Question
description: Ask a usage / configuration / "how do I" question
title: "[Question] "
labels: ["question", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        For broader discussion, use [GitHub Discussions](https://github.com/AuraBootTeam/auraboot/discussions) or [Discord](https://discord.gg/p2fW5A2MW6). For private beta feedback, licensing boundaries, or setup notes that need follow-up, use the [website feedback form](https://www.auraboot.com/contact?interest=feedback).

        Before asking:
        - Search [existing issues](https://github.com/AuraBootTeam/auraboot/issues?q=)
        - Check the [docs](https://docs.auraboot.com)
        - For licensing questions, see the [License FAQ](https://github.com/AuraBootTeam/auraboot/blob/main/LICENSE-FAQ-en.md)

  - type: textarea
    id: question
    attributes:
      label: Your question
      placeholder: How do I ...?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you already tried?
      placeholder: I read X, I tried Y, I expected Z but saw ...

  - type: input
    id: version
    attributes:
      label: AuraBoot version (if relevant)

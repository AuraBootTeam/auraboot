name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Before submitting, please search [existing issues](https://github.com/AuraBootTeam/auraboot/issues) to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user pain point or use case. Avoid jumping straight to a solution.
      placeholder: I'm trying to ... but currently I have to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? Sketch the API / UI / DSL if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they're not ideal.

  - type: dropdown
    id: scope
    attributes:
      label: Which area?
      multiple: true
      options:
        - DSL / Model
        - Page Designer
        - BPMN / Workflow
        - Automation
        - AI / AuraBot / ChatBI
        - Plugin system
        - Permissions / RBAC
        - Frontend / UX
        - Backend / API
        - DevOps / Deployment
        - Documentation
        - Other

  - type: textarea
    id: extra
    attributes:
      label: Additional context

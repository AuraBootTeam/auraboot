# Dependabot configuration for AuraBoot OSS
# Reduces time-to-patch on third-party CVEs without flooding the team.
# Tune after launch — first month we may want fewer auto-PRs.

version: 2

updates:
  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps-ci)"

  # Backend (Gradle)
  - package-ecosystem: "gradle"
    directory: "/platform"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      spring:
        patterns:
          - "org.springframework*"
      backend-minor-patch:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "area: backend"
    commit-message:
      prefix: "chore(deps-backend)"
    # Don't auto-bump major versions — those usually need code changes.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Frontend (pnpm)
  - package-ecosystem: "npm"
    # pnpm-lock.yaml lives at the repository root. Scanning /web-admin updates
    # package.json without the workspace lockfile and creates born-red PRs.
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      frontend-runtime:
        dependency-type: "production"
        patterns:
          - "*"
      frontend-development:
        dependency-type: "development"
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "area: frontend"
    commit-message:
      prefix: "chore(deps-frontend)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/platform"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "area: devops"
    commit-message:
      prefix: "chore(deps-docker)"

  - package-ecosystem: "docker"
    directory: "/web-admin"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "area: devops"
    commit-message:
      prefix: "chore(deps-docker)"

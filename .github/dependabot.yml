# Dependabot configuration for AuraBoot OSS
# Reduces time-to-patch on third-party CVEs without flooding the team.
#
# ⏸ PAUSED (2026-07-02): open-pull-requests-limit is 0 on every ecosystem to
# stop Dependabot regenerating branches during the planned git-history rewrite
# (internal-doc purge). Version updates are on hold until the rewrite window
# closes. TO RE-ENABLE after the rewrite: restore the previous limits
# (github-actions: 5, gradle: 8, npm: 8, docker: default) — see this file's
# git history.

version: 2

updates:
  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps-ci)"

  # Backend (Gradle)
  - package-ecosystem: "gradle"
    directory: "/platform"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "area: backend"
    commit-message:
      prefix: "chore(deps-backend)"
    # Don't auto-bump major versions — those usually need code changes.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Frontend (pnpm)
  - package-ecosystem: "npm"
    directory: "/web-admin"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "area: frontend"
    commit-message:
      prefix: "chore(deps-frontend)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/platform"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "area: devops"
    commit-message:
      prefix: "chore(deps-docker)"

  - package-ecosystem: "docker"
    directory: "/web-admin"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "area: devops"
    commit-message:
      prefix: "chore(deps-docker)"

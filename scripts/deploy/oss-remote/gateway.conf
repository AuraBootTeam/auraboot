# OSS edge gateway — fronts the BFF (frontend:3000), which serves the SPA and
# proxies /api/* to backend:6443. In coexist mode it sits behind an external TLS proxy.
worker_processes auto;
events { worker_connections 1024; }

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
    # Preserve an upstream TLS proxy's X-Forwarded-Proto (https); fall back to our own.
    map $http_x_forwarded_proto $fwd_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    upstream app { server frontend:3000; }

    server {
        listen 80;
        server_name _;
        client_max_body_size 100m;

        location / {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $fwd_proto;
            proxy_set_header X-Forwarded-Host  $host;
            # WebSocket (IM / real-time sync)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # SSE / streaming (chat, agent) — no buffering, long timeouts
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }
}

# ============================================================
# Docker Compose — Monolith mode
# ============================================================
# Single application container + shared infra.
# Usage: docker compose -f docker-compose.monolith.yml up -d
# ============================================================

version: '3.8'

services:

  # ── Shared infrastructure ──────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: aura-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-aura_boot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aura-network

  redis:
    image: redis:7-alpine
    container_name: aura-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["cmd", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aura-network

  # ── Observability ──────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: aura-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - aura-network

  grafana:
    image: grafana/grafana:10.4.1
    container_name: aura-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - aura-network

  # ── Application (monolith) ─────────────────────────────────

  app:
    build:
      context: ./platform
      dockerfile: Dockerfile
    container_name: aura-app
    environment:
      SPRING_PROFILES_ACTIVE: monolith
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-aura_boot}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "6443:6443"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aura-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  aura-network:
    driver: bridge

groups:
  - name: auraboot.learning_loop
    rules:
      - alert: ShadowSchedulerStalled
        expr: absent_over_time(auraboot_shadow_run_outcome_total[30m])
        for: 15m
        labels:
          severity: warning
          component: acp-learning-loop
        annotations:
          summary: "Shadow scheduler stalled"
          description: "No shadow runs recorded in 30 min — check acp.learning.shadow.scheduler.enabled"

      - alert: HighNotFoundRate
        expr: (sum(rate(auraboot_promotion_decision_total{decision="NOT_FOUND"}[1h])) / sum(rate(auraboot_promotion_decision_total[1h]))) > 0.05
        for: 30m
        labels:
          severity: warning
          component: acp-learning-loop
        annotations:
          summary: "High NOT_FOUND rate in promotion evaluator"
          description: "Promotion evaluator seeing >5% NOT_FOUND decisions — stale draft PIDs in use"

      - alert: PromotionStalled
        expr: sum(increase(auraboot_promotion_decision_total{decision="PROMOTE"}[7d])) == 0 and sum(increase(auraboot_promotion_decision_total{decision="INSUFFICIENT_RUNS"}[7d])) > 10
        for: 1h
        labels:
          severity: info
          component: acp-learning-loop
        annotations:
          summary: "Promotion evaluator not promoting drafts"
          description: "PromotionEvaluator ran but never promoted in 7d despite 10+ evaluations — threshold too strict or shadow runs not converging"

  - name: auraboot.memory_promotion
    rules:
      - alert: MemoryReviewerStalled
        expr: (max(auraboot_memory_promotion_reviewer_backlog_seconds) > 604800) and (max(auraboot_memory_promotion_pending_count) > 50)
        for: 4h
        labels:
          severity: warning
          component: acp-memory-promotion
        annotations:
          summary: "Memory promotion reviewer backlog stalled"
          description: "Oldest pending memory promotion > 7d AND queue depth > 50 — reviewer attention needed"

      - alert: MemoryHighRejectionRate
        expr: (sum(rate(auraboot_memory_promotion_decision_total{decision="REJECT"}[30d])) / sum(rate(auraboot_memory_promotion_decision_total{decision=~"APPROVE|REJECT"}[30d]))) > 0.6
        for: 1d
        labels:
          severity: info
          component: acp-memory-promotion
        annotations:
          summary: "High memory promotion rejection rate"
          description: "Reject rate > 60% over 30d — extractor may need tuning (raise min-similarity / min-users-per-tenant)"

      - alert: MemoryShadowRetractionSpike
        expr: sum by (tenant) (increase(auraboot_memory_promotion_shadow_retraction_total[7d])) > 3
        for: 1h
        labels:
          severity: warning
          component: acp-memory-promotion
        annotations:
          summary: "Shadow retraction spike on tenant {{ $labels.tenant }}"
          description: "Tenant has retracted >3 shadow promotions in 7d — proposal quality is degraded"

      - alert: MemoryExtractorIdle
        expr: increase(auraboot_memory_promotion_proposal_total[14d]) == 0
        for: 1d
        labels:
          severity: info
          component: acp-memory-promotion
        annotations:
          summary: "Memory promotion extractor idle"
          description: "No memory promotion proposals generated in 14d — extractor may be disabled (acp.memory.promotion.scheduler.enabled) or tenant may lack signal"

  - name: auraboot.user_soul_profile
    interval: 1m
    rules:
      - alert: UserSoulProfileHighStaleRate
        expr: (auraboot_user_soul_profile_stale_count / clamp_min(auraboot_user_soul_profile_active_count, 1)) > 0.4
        for: 30d
        labels:
          severity: warning
          component: acp-user-soul-profile
        annotations:
          summary: "User Soul Profile stale-to-active ratio > 40%"
          description: "Staleness detector is flagging > 40% of active profiles for 30 days — derivation algorithm may be drifting or look-back window is too narrow"

      - alert: UserSoulProfileDerivationFailureSpike
        expr: (sum(rate(auraboot_user_soul_profile_derivation_total{outcome="failed"}[7d])) / clamp_min(sum(rate(auraboot_user_soul_profile_derivation_total[7d])), 1)) > 0.05
        for: 7d
        labels:
          severity: warning
          component: acp-user-soul-profile
        annotations:
          summary: "User Soul Profile derivation failure rate > 5% for 7d"
          description: "More than 5% of derivation runs are failing — LLM provider outage, schema drift, or embedding mismatch"

      - alert: UserSoulProfileHighEditRate
        expr: (sum(rate(auraboot_user_soul_profile_user_edit_total[30d])) / clamp_min(sum(auraboot_user_soul_profile_active_count), 1)) > 0.5
        for: 30d
        labels:
          severity: info
          component: acp-user-soul-profile
        annotations:
          summary: "Users override USP fields > 50% of the time"
          description: "High user-edit rate over 30d — derivation signal is wrong enough that users routinely override; consider retraining / threshold adjustment"

      - alert: UserSoulProfileRateLimitSpike
        expr: sum(rate(auraboot_user_soul_profile_manual_derive_total{outcome="rate_limited"}[1h])) > sum(rate(auraboot_user_soul_profile_manual_derive_total{outcome="triggered"}[1h]))
        for: 1h
        labels:
          severity: info
          component: acp-user-soul-profile
        annotations:
          summary: "Manual-derive rate-limit rejections exceed triggers"
          description: "More manual-derive attempts are being blocked than succeeding — UX friction; consider 12h window or increasing budget"

  - name: auraboot.memory_tier
    interval: 1m
    rules:
      - alert: PromotionFailureRateHigh
        expr: sum(rate(auraboot_memory_tier_promotion_total{outcome="failed"}[5m])) > (0.1 / 60)
        for: 10m
        labels:
          severity: warning
          component: acp-memory-tier
        annotations:
          summary: "Memory tier promotion failure rate high"
          description: "auraboot_memory_tier_promotion_total{outcome=failed} rate > 0.1/min for 10m — check DB / pgvector availability and recent Promoter exceptions"

      - alert: DemotionSpike
        expr: sum(rate(auraboot_memory_tier_demotion_total{outcome="demoted"}[5m])) > (100 / 60)
        for: 5m
        labels:
          severity: warning
          component: acp-memory-tier
        annotations:
          summary: "Memory tier demotion spike"
          description: "Demoter demoting > 100 rows/min for 5m — unusual cascade; verify acp.memory.l1l2.demoter.age-days / importance-max were not lowered accidentally"

      - alert: OrphanBacklogGrowing
        expr: sum(increase(auraboot_memory_tier_promotion_total{outcome="failed"}[3m])) == 0 and sum by (tenant) (increase(auraboot_memory_tier_event_total{event_type="L1_PROMOTED"}[45m])) > 150
        for: 15m
        labels:
          severity: warning
          component: acp-memory-tier
        annotations:
          summary: "Orphan scanner catching > 50 rows/tick for 3 consecutive ticks"
          description: "Orphan backlog growing — event-driven path is losing events; check SessionEndedEvent publication in AgentRunService and listener exceptions"

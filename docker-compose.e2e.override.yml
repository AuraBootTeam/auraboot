# E2E test override — adds plugin mount and non-conflicting host ports.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.e2e.override.yml \
#     --profile full up -d
#
# This file is intentionally kept in the OSS repo root so that the compose
# project (working_dir = /Users/.../auraboot) resolves relative paths correctly.

services:
  postgres:
    container_name: auraboot-e2e-postgres
    ports:
      - "15432:5432"

  backend:
    container_name: auraboot-e2e-backend
    ports:
      - "16443:6443"
    volumes:
      # Mount host plugins dir read-only so /api/plugins/import/import-directory-sync
      # can resolve absolute paths like /app/plugins/<name>.
      # Mount the WORKTREE's plugins (not main repo's) so E2E edits to workflow-demo
      # are visible inside the container without needing to copy into main repo.
      - /Users/ghj/work/auraboot/auraboot-wf-e2e/plugins:/app/plugins:ro
    environment:
      # CORS allow-list for E2E: worktree vite dev (5174) + loopback variants.
      # Default FRONTEND_BASE_URL (3000) does not match where E2E targets.
      FRONTEND_BASE_URL: http://localhost:5174
      CORS_ALLOWED_ORIGINS: "http://localhost:5174,http://localhost:3501,http://127.0.0.1:5174"

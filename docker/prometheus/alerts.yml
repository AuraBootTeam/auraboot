groups:
  - name: auraboot_infrastructure
    rules:
      - alert: HighCpuUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"

      - alert: HighJvmHeapUsage
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap usage above 85%"

      - alert: HighEventLoopLag
        expr: bff_nodejs_eventloop_lag_p99_seconds > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Node.js event loop lag p99 > 100ms"

      - alert: HighApiP95Latency
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API P95 latency > 500ms"

      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 1%"

      - alert: HighSqlCountPerRequest
        expr: auraboot_request_sql_count{quantile="0.99"} > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 SQL count per request > 50 (N+1 likely)"

      - alert: HikariConnectionPoolExhaustion
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "HikariCP connection pool > 80% utilized"

      - alert: ThreadPoolQueueSaturation
        expr: executor_queue_remaining_tasks < 20
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Thread pool queue nearly full on {{ $labels.name }}"

  - name: auraboot_database
    rules:
      - alert: HighSlowQueryRate
        expr: rate(auraboot_sql_slow_query_count_total[5m]) > 0.17
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "More than 10 slow queries per minute"

      - alert: LowCacheHitRatio
        expr: pg_stat_user_tables_heap_blks_hit / (pg_stat_user_tables_heap_blks_hit + pg_stat_user_tables_heap_blks_read) < 0.99
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL buffer cache hit ratio below 99%"

  # Agent runtime. Deliberately narrow: every expression below is written against
  # a metric verified as actually exported by a running backend
  # (/actuator/prometheus on a live stack, 2026-07-21). Alerting on a metric that
  # is never emitted is worse than not alerting — it is a rule that can only ever
  # be silent, and it looks like coverage.
  - name: auraboot_agent
    rules:
      - alert: AgentToolExecutionFailureRate
        # The agent's hands. Tools failing in bulk means it is answering without
        # being able to act, which reads to a user as a confidently useless
        # assistant rather than as an outage.
        expr: |
          sum(rate(aurabot_agent_tool_execution_total{outcome="failed"}[10m]))
            / clamp_min(sum(rate(aurabot_agent_tool_execution_total[10m])), 0.001) > 0.25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "More than a quarter of agent tool executions are failing"

      - alert: AgentAuthorizationDenialSpike
        # A sustained run of denials is either a policy regression locking people
        # out of their own tools, or something repeatedly trying what it may not.
        # Both are worth a look, and neither shows up anywhere else.
        expr: sum(rate(aurabot_agent_authorization_decision_total{decision="denied"}[10m])) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Agent authorization denials sustained above 30/min"

      - alert: AgentToolDiscoveryReturnsNothing
        # Discovery running while handing back zero tools is the shape of the
        # F10 defect: the agent keeps taking turns and silently cannot act,
        # with no error anywhere. Only visible as a ratio.
        expr: |
          rate(aurabot_agent_tool_discovery_tools_sum[15m])
            / clamp_min(rate(aurabot_agent_tool_discovery_calls_total[15m]), 0.001) < 0.5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Agent tool discovery is returning almost no tools"

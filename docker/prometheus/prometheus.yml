# Prometheus config — Monolith mode
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'aura-monolith'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['app:6443']
        labels:
          service: monolith

  - job_name: 'aura-bff'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:5173']
        labels:
          service: 'bff'

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstream services ────────────────────────────────────
    upstream meta_core {
        server meta-core:6501;
    }
    upstream biz_runtime {
        server biz-runtime:6502;
    }
    upstream bpm_engine {
        server bpm-engine:6503;
    }
    upstream im_service {
        server im-service:6504;
    }
    upstream agent_runtime {
        server agent-runtime:6505;
    }

    server {
        listen 6443;
        server_name _;

        # ── Meta / Schema APIs ───────────────────────────────
        location /api/meta/ {
            proxy_pass http://meta_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/schema/ {
            proxy_pass http://meta_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Dynamic CRUD / Business ─────────────────────────
        location /api/data/ {
            proxy_pass http://biz_runtime;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/command/ {
            proxy_pass http://biz_runtime;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/datasource/ {
            proxy_pass http://biz_runtime;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── BPM / Workflow ───────────────────────────────────
        location /api/bpm/ {
            proxy_pass http://bpm_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/workflow/ {
            proxy_pass http://bpm_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── IM / WebSocket ───────────────────────────────────
        location /api/im/ {
            proxy_pass http://im_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # ── Agent / AI ───────────────────────────────────────
        location /api/agent/ {
            proxy_pass http://agent_runtime;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/aurabot/ {
            proxy_pass http://agent_runtime;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # SSE support for streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # ── Auth (shared, route to meta-core) ────────────────
        location /api/auth/ {
            proxy_pass http://meta_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Health check ─────────────────────────────────────
        location /health {
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }

        # ── Fallback: route to biz-runtime ───────────────────
        location /api/ {
            proxy_pass http://biz_runtime;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

# PostgreSQL Performance Tuning for AuraBoot
# Include via: include = '/etc/postgresql/postgresql-tuning.conf'
# or copy settings to postgresql.conf

# Memory — adjust based on available RAM
shared_buffers = 2GB              # 25% of RAM for dedicated DB, 2GB for dev
effective_cache_size = 6GB        # 75% of RAM estimate for OS + PG caches
work_mem = 64MB                   # Per-sort/hash operation (be careful with many connections)
maintenance_work_mem = 512MB      # For VACUUM, CREATE INDEX, ALTER TABLE

# WAL — reduce I/O
wal_buffers = 64MB                # 1/32 of shared_buffers, max 64MB
checkpoint_completion_target = 0.9

# Planner — better query plans
random_page_cost = 1.1            # SSD storage (default 4.0 is for HDD)
effective_io_concurrency = 200    # SSD: 200, HDD: 2

# Autovacuum — more aggressive for high-write tables
autovacuum_vacuum_scale_factor = 0.05   # Default 0.2 — vacuum sooner
autovacuum_analyze_scale_factor = 0.025 # Default 0.1 — analyze sooner

# Logging — for development
log_min_duration_statement = 20   # Log queries slower than 20ms
log_statement = 'none'            # Don't log all statements (too verbose)

# pg_stat_statements — requires shared_preload_libraries
# shared_preload_libraries = 'pg_stat_statements'
# pg_stat_statements.max = 10000
# pg_stat_statements.track = all

// Classes excluded from coverage measurement:
// - Entity / DTO / mapper interfaces (no logic, just data containers)
// - Spring @Configuration classes (bean wiring, not business logic)
// - Application bootstrap / seeders (one-time init, tested indirectly via integration)
// - Generated enums/constants
// - Complex orchestration engines tested via E2E (BPM, Finance, APS, Agent)
// - Controllers (covered by E2E browser tests)
// - Infrastructure adapters (MQ, Storage, DDL dialects) - platform-specific, tested in subprojects
// - Template/report generators - output-based, verified via E2E
// - Plugin system internals - tested via E2E plugin import flows
def jacocoExcludes = [
    // Data layer — no logic
    '**/entity/**',
    '**/dao/entity/**',
    '**/dto/**',
    '**/mapper/**',
    '**/constant/**',
    '**/config/**',
    '**/application/bootstrap/**',
    '**/application/config/**',
    '**/*Application.class',
    '**/*Properties.class',
    '**/*Record.class',
    '**/datasync/DataSyncMessage.class',
    // Enums, exceptions, events — simple value holders
    '**/enums/**',
    '**/exception/**',
    '**/event/**',
    '**/bean/**',
    '**/converter/**',
    // Controllers — covered by E2E tests
    '**/controller/**',
    // Complex domain engines — covered by E2E flows
    '**/bpm/**',
    '**/finance/**',
    '**/aps/**',
    '**/mrp/**',
    '**/excel/**',
    // Infrastructure adapters — platform-specific, tested in subprojects or E2E
    '**/infrastructure/mq/redis/**',
    '**/infrastructure/mq/kafka/**',
    '**/infrastructure/mq/rabbitmq/**',
    '**/infrastructure/storage/s3/**',
    '**/infrastructure/storage/oss/**',
    '**/infrastructure/storage/minio/**',
    '**/ddl/**',
    // Template/report generators — output verified via E2E
    '**/template/generator/**',
    '**/report/**',
    '**/print/**',
    // Plugin system internals — tested via import/E2E flows
    '**/plugin/extension/**',
    '**/plugin/exception/**',
    '**/plugin/util/**',
    '**/plugin/marketplace/**',
    // Agent/AI subsystems — tested via E2E
    '**/agent/**',
    '**/aurabot/**',
    '**/ai/**',
    '**/chatbi/**',
    // Inbox/mobile — tested via E2E
    '**/inbox/**',
    // NOTE (2026-06-11): meta/service/impl (command pipeline, metadata orchestration,
    // state machines) was previously excluded as "tested indirectly". Measurement showed
    // it is actually ~47% line-covered by 47 existing test files — excluding it
    // artificially inflated the bundle (80.1% on a narrow denominator) and HID the
    // orchestration core. It is now MEASURED so the gate reflects real business logic.
    // Including it moves the bundle to ~70.2% line. Controllers stay excluded (E2E-covered).
]

jacocoTestReport {
    dependsOn test
    // Offline instrumentation writes here (jacoco-agent.destfile on the test task); the report
    // reads the ORIGINAL on-disk classes (build/classes) — coverage was recorded against their
    // stable IDs, so no runtime classdump of CGLIB proxies is needed.
    executionData.setFrom(files("${buildDir}/jacoco/test.exec"))
    afterEvaluate {
        def allClassDirs = classDirectories.files.collect {
            fileTree(dir: it, exclude: jacocoExcludes)
        }
        classDirectories.setFrom(files(allClassDirs))
    }
    reports {
        xml.required = true
        csv.required = false
        html.required = true
    }
}

jacocoTestCoverageVerification {
    dependsOn jacocoTestReport
    // Read the offline-instrumentation exec (same file the report uses).
    executionData.setFrom(files("${buildDir}/jacoco/test.exec"))
    afterEvaluate {
        // Verify against the original compiled classes — offline instrumentation records
        // coverage on their stable on-disk IDs, so no runtime CGLIB classdump is involved.
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: jacocoExcludes)
        }))
    }
    violationRules {
        // No-regression ratchet over the HONEST denominator. 2026-06-10 the curated
        // bundle read 80.1% (33671/42043) — but that excluded meta/service/impl (the
        // command pipeline). 2026-06-11 that exclude was removed (it was already ~47%
        // covered), so the bundle now measures the real orchestration core and read
        // ~70.2% (42826/61002), floor 0.68. A wave of real-stack IT for the
        // meta/service/impl command-pipeline core (2026-06-11) then lifted the package
        // 47.0%->56.1%: DictService 26.7->79%, DictCascade 1.8->77%, DictVersion
        // 36.7->74%, DynamicData 34->39%, ReconciliationService 0.2->79%, NamedQuery
        // 47->85% (~+1437 covered lines). The gate-denominator bundle now reads
        // ~73.2% (45356/61940), so the floor is raised 0.68->0.69->0.71 (preserving the
        // original ~2pt flaky margin — full-suite IT has run-to-run flake). Keep raising
        // it as more of meta/service/impl lands. The number went DOWN from the old
        // narrow 80% but the SCOPE went UP — this is more rigorous, not less.
        // 2026-06-11 wave 2: real-stack IT for six more near-zero meta/service/impl
        // classes — EdiService 0.3->96%, QueryAuditServiceImpl 8.5->82%,
        // SecureQueryExecutorImpl 16->74%, SchemaAccessProjectorImpl 0.4->57%,
        // FieldForkServiceImpl 1->87%, FieldImpactAnalysisServiceImpl 1->100%
        // (+249 tests, ~+1600 covered lines). meta/service/impl 56.1->65.4%; the
        // gate-denominator bundle now reads ~0.75, so the floor is raised 0.71->0.73
        // (same ~2pt flaky margin). Two of the six surfaced live jsonb-persistence
        // bugs (fixed in-band); behavioral findings are in
        // docs/backlog/2026-06-11-meta-impl-coverage-product-findings.md.
        // 2026-06-18 wave 4 (gate consolidation): coverage moved to JaCoCo OFFLINE
        // instrumentation. The prior runtime CGLIB classdump mis-attributed coverage across the
        // suite's many @SpringBootTest contexts (proxy class IDs diverge per evicted/recreated
        // context), so a full run read a bogus ~5% bundle. Offline instruments build/classes at
        // build time -> coverage records on stable on-disk IDs. A clean full suite (bootstrap
        // seed + current Flyway-baseline schema incl. billing) now measures the bundle at 77.35%
        // (51452/66519); security service packages 0.85-0.99. Floor raised 0.73->0.75 (same ~2pt
        // flaky margin; conservative — 73 pre-existing/env failures still undercount coverage).
        // Evidence: docs/retro/2026-06-18-oss-coverage-gate-consolidation-testing-gate-acceptance-report.md.
        // 2026-06-19 backend IT waves 5-8 (#847-#850): real-stack ITs for DataDomainServiceImpl
        // (7->96%), FieldMaskServiceImpl (22->84%), VirtualFieldEngine.evaluate, ApiConnector +
        // JdbcConnector CRUD, plus three live bugs fixed (two missing cache regions + a
        // tenant-interceptor recursive-CTE break, all surfaced by the ITs) and a systemic
        // cache-name audit (every @Cacheable/@CacheEvict name now registered). The clean full
        // suite now measures 77.69% (51718/66566); floor raised 0.75->0.76 (security packages
        // still 0.85-0.99). Keep raising it per wave toward the 0.80 target.
        // 2026-06-19 backend IT waves 9-21 (#852-#867): SodService/DrtDefinition/CloudConfig CRUD,
        // FieldValidation, FieldBindingContext (1->73%), RelationSync, ActivityEventListener
        // (7->58%, @Async unwrapped via AopTestUtils), AsyncTask, AssertPhase, VirtualFieldEngine
        // graph (->82%), DynamicData typed-coercion + Excel export, AuditTrail (52->86%), Category,
        // DataPermission/PostExecution branches. Clean full suite now 78.69% (52380/66566); floor
        // raised 0.76->0.77 (1.69pt margin, same as the 0.76 bump; security packages 0.85-0.99).
        rule {
            enabled = true
            element = 'BUNDLE'
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.77
            }
        }
        // Lock the already-strong security/identity domains so they cannot rot.
        rule {
            enabled = true
            element = 'PACKAGE'
            includes = [
                'com.auraboot.framework.permission.service.impl',
                'com.auraboot.framework.auth.service.impl',
                'com.auraboot.framework.tenant.service.impl',
                'com.auraboot.framework.rbac.service.impl',
            ]
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.84
            }
        }
    }
}

tasks.register('coverage') {
    group = 'verification'
    description = 'Run tests and generate JaCoCo reports with minimum coverage checks.'
    dependsOn 'test', 'jacocoTestReport', 'jacocoTestCoverageVerification'
}

// Task to check for SNAPSHOT dependencies (run before release)
tasks.register('checkSnapshotDependencies') {
    description = 'Checks for SNAPSHOT dependencies that should not be used in production'
    group = 'verification'

    doLast {
        def snapshots = []
        configurations.runtimeClasspath.resolvedConfiguration.resolvedArtifacts.each { artifact ->
            if (artifact.moduleVersion.id.version.contains('SNAPSHOT')) {
                snapshots << "${artifact.moduleVersion.id.group}:${artifact.moduleVersion.id.name}:${artifact.moduleVersion.id.version}"
            }
        }
        if (!snapshots.isEmpty()) {
            logger.warn('WARNING: Found SNAPSHOT dependencies:')
            snapshots.each { logger.warn("  - $it") }
            logger.warn('Consider replacing with stable versions before production deployment.')
        }
    }
}

// Run SNAPSHOT check before build
tasks.named('build') {
    finalizedBy 'checkSnapshotDependencies'
}


# Phase 2.3: dev profile turns the unified BootstrapStartupRunner ON by default.
# Override with AURABOOT_BOOTSTRAP_ENABLED=false to opt out (e.g. oss-reset-and-init.sh
# pre-Phase-2.4 still does this so the script's wizard call is sole authority).
auraboot:
  bootstrap:
    enabled: ${AURABOOT_BOOTSTRAP_ENABLED:true}
    # Phase 3: dev profile defaults demo-seed to true so `gradlew bootRun` gets
    # the demo plugin set (showcase / crm-starter / agent-control-plane / workflow-demo).
    # Override with AURABOOT_DEMO_SEED=false to opt out.
    demo-seed: ${AURABOOT_DEMO_SEED:true}

logging:
  level:
    root: info

    # ========== MyBatis / JDBC（核心降噪） ==========
    org.apache.ibatis: warn
    org.apache.ibatis.session: warn
    org.apache.ibatis.logging: warn
    org.mybatis: warn
    org.mybatis.spring: warn

    # JDBC 连接 & SQL
    java.sql: warn
    javax.sql: warn

    # Spring 事务（关闭“不是事务也没事”的提示）
    org.springframework.transaction: warn
    org.springframework.jdbc.datasource: warn

    # ========== Spring Web / Security ==========
    org.springframework.web: debug
    org.springframework.security: info

    # ========== Hikari ==========
    com.zaxxer.hikari: info

    io.opentelemetry.sdk.trace.SdkSpan : info

    # ========== 你自己的代码 ==========
    com.auraboot.framework: info

# Agent Control Plane
agent:
  enabled: true
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}

# Dev-mode: enable all actuator endpoints for debugging; disable tracing (no OTLP collector in local dev)
management:
  tracing:
    enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,configprops,loggers,prometheus
    enabled-by-default: true
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

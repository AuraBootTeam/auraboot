# AuraBoot Community Edition Profile
# Usage: ./gradlew bootRun -PcommunityMode=true -Dspring.profiles.active=community
#
# This profile runs AuraBoot without enterprise modules.
# Enterprise features (Agent orchestration, IM, Social Auth, advanced notifications)
# are not available in this mode.

auraboot:
  entitlement:
    enabled: false
  agent:
    enabled: true   # AI Core (AuraBot, Tool Gen, ChatBI) is available in community
  # Community startup must not repair/bootstrap data implicitly.
  # Use the explicit setup flow or reset-and-init.sh to initialize a database.
  bootstrap:
    # Phase 3: community profile defaults demo-seed ON for showcase parity.
    demo-seed: ${AURABOOT_DEMO_SEED:true}

logging:
  level:
    com.auraboot.framework.agent.spi: INFO

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Helvetica, Arial, sans-serif; font-size: 12px; color: #333; padding: 40px; }
        .header-table { width: 100%; margin-bottom: 30px; }
        .header-table td { vertical-align: top; }
        .company-name { font-size: 20px; font-weight: bold; }
        .doc-title { font-size: 24px; font-weight: bold; color: #d97706; text-align: right; }
        .doc-number { font-size: 11px; color: #666; text-align: right; margin-top: 4px; }
        .info-table { width: 100%; margin-bottom: 20px; }
        .info-table td { vertical-align: top; width: 50%; }
        .info-label { font-size: 11px; color: #999; text-transform: uppercase; margin-bottom: 6px; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table thead th { background-color: #fffbeb; border-bottom: 2px solid #fde68a; padding: 8px 10px; text-align: left; font-size: 10px; text-transform: uppercase; color: #92400e; }
        .data-table tbody td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; }
        .text-right { text-align: right; }
        .sig-table { width: 100%; margin-top: 60px; }
        .sig-block { border-top: 1px solid #333; padding-top: 8px; font-size: 11px; width: 45%; }
        .footer { margin-top: 40px; padding-top: 16px; border-top: 1px solid #e2e8f0; font-size: 10px; color: #999; text-align: center; }
    </style>
</head>
<body>

<!-- Header: company info + document title -->
<table class="header-table">
    <tr>
        <td>
            <div class="company-name" th:text="${params['companyName'] ?: 'AuraBoot Inc.'}">AuraBoot Inc.</div>
        </td>
        <td style="text-align: right;">
            <div class="doc-title">DELIVERY NOTE</div>
            <div class="doc-number">No. <span th:text="${record['pid']}">DN-001</span></div>
        </td>
    </tr>
</table>

<!-- Ship-to and shipping details -->
<table class="info-table">
    <tr>
        <td>
            <div class="info-label">Ship To</div>
            <p th:text="${record['customer_name'] ?: record['account_name'] ?: record['org_dept_name'] ?: 'N/A'}">Customer</p>
            <p th:text="${record['shipping_address'] ?: record['address'] ?: ''}"></p>
        </td>
        <td style="text-align: right;">
            <div class="info-label">Shipping Details</div>
            <p>Date: <span th:text="${record['created_at'] ?: 'N/A'}">2026-01-01</span></p>
            <p>Status: <span th:text="${record['status'] ?: record['org_dept_status'] ?: 'PENDING'}">PENDING</span></p>
        </td>
    </tr>
</table>

<!-- Line items -->
<table class="data-table">
    <thead>
        <tr>
            <th>#</th>
            <th>Item</th>
            <th class="text-right">Qty</th>
            <th>Unit</th>
            <th>Notes</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="line, iter : ${lines}">
            <td th:text="${iter.index + 1}">1</td>
            <td th:text="${line['description'] ?: line['product_name'] ?: 'Item'}">Item</td>
            <td class="text-right" th:text="${line['quantity'] ?: 1}">1</td>
            <td th:text="${line['unit'] ?: 'pcs'}">pcs</td>
            <td th:text="${line['notes'] ?: ''}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(lines)}">
            <td colspan="5" style="text-align:center;color:#999;padding:20px;">No items</td>
        </tr>
    </tbody>
</table>

<!-- Signatures -->
<table class="sig-table">
    <tr>
        <td class="sig-block">Dispatched by: _______________</td>
        <td style="width:10%;"></td>
        <td class="sig-block">Received by: _______________</td>
    </tr>
</table>

<!-- Footer -->
<div class="footer">
    <p>Generated by AuraBoot Platform</p>
</div>

</body>
</html>

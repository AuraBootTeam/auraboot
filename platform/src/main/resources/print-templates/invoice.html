<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Helvetica, Arial, sans-serif; font-size: 12px; color: #333; padding: 40px; }
        .header-table { width: 100%; margin-bottom: 30px; }
        .header-table td { vertical-align: top; }
        .company-name { font-size: 20px; font-weight: bold; color: #1a1a1a; }
        .company-detail { font-size: 10px; color: #666; margin-top: 4px; }
        .doc-title { font-size: 24px; font-weight: bold; color: #2563eb; text-align: right; }
        .doc-number { font-size: 11px; color: #666; text-align: right; margin-top: 4px; }
        .info-table { width: 100%; margin-bottom: 20px; }
        .info-table td { vertical-align: top; width: 50%; }
        .info-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table thead th { background-color: #f8fafc; border-bottom: 2px solid #e2e8f0; padding: 8px 10px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; }
        .data-table tbody td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; }
        .text-right { text-align: right; }
        .totals-table { width: 280px; margin-left: auto; margin-top: 16px; }
        .totals-table td { padding: 4px 10px; }
        .total-row td { font-weight: bold; font-size: 14px; border-top: 2px solid #333; }
        .footer { margin-top: 40px; padding-top: 16px; border-top: 1px solid #e2e8f0; font-size: 10px; color: #999; text-align: center; }
    </style>
</head>
<body>

<!-- Header: company info + document title -->
<table class="header-table">
    <tr>
        <td>
            <div class="company-name" th:text="${params['companyName'] ?: 'AuraBoot Inc.'}">AuraBoot Inc.</div>
            <div class="company-detail" th:text="${params['companyAddress'] ?: '123 Tech Street, San Francisco, CA 94105'}">123 Tech Street</div>
            <div class="company-detail" th:text="${params['companyContact'] ?: 'contact@auraboot.com'}">contact@auraboot.com</div>
        </td>
        <td style="text-align: right;">
            <div class="doc-title">INVOICE</div>
            <div class="doc-number">No. <span th:text="${record['pid']}">INV-001</span></div>
        </td>
    </tr>
</table>

<!-- Bill-to and invoice details -->
<table class="info-table">
    <tr>
        <td>
            <div class="info-label">Bill To</div>
            <p th:text="${record['customer_name'] ?: record['account_name'] ?: record['org_dept_name'] ?: 'N/A'}">Customer</p>
        </td>
        <td style="text-align: right;">
            <div class="info-label">Details</div>
            <p>Date: <span th:text="${record['created_at'] ?: 'N/A'}">2026-01-01</span></p>
            <p>Status: <span th:text="${record['status'] ?: record['org_dept_status'] ?: 'DRAFT'}">DRAFT</span></p>
        </td>
    </tr>
</table>

<!-- Line items -->
<table class="data-table">
    <thead>
        <tr>
            <th style="width:5%;">#</th>
            <th style="width:40%;">Description</th>
            <th class="text-right" style="width:15%;">Qty</th>
            <th class="text-right" style="width:20%;">Unit Price</th>
            <th class="text-right" style="width:20%;">Amount</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="line, iter : ${lines}">
            <td th:text="${iter.index + 1}">1</td>
            <td th:text="${line['description'] ?: line['product_name'] ?: 'Item'}">Item</td>
            <td class="text-right" th:text="${line['quantity'] ?: 1}">1</td>
            <td class="text-right" th:text="${line['unit_price'] ?: '0.00'}">0.00</td>
            <td class="text-right" th:text="${line['amount'] ?: '0.00'}">0.00</td>
        </tr>
        <tr th:if="${#lists.isEmpty(lines)}">
            <td colspan="5" style="text-align:center;color:#999;padding:20px;">No line items</td>
        </tr>
    </tbody>
</table>

<!-- Totals -->
<table class="totals-table">
    <tr class="total-row">
        <td>Total:</td>
        <td class="text-right" th:text="${record['total_amount'] ?: '0.00'}">0.00</td>
    </tr>
</table>

<!-- Footer -->
<div class="footer">
    <p th:text="${params['footerNote'] ?: 'Thank you for your business. Payment is due within 30 days.'}">Thank you.</p>
    <p style="margin-top: 4px;">Generated by AuraBoot Platform</p>
</div>

</body>
</html>

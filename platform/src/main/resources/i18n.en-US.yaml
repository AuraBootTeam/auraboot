    sendWebhook.desc: Send a Webhook request to specified URL

  # Controls
  control:
    condition: Condition
    condition.desc: Determine execution path based on condition expression
    delay: Delay
    delay.desc: Wait for specified time before continuing
    loop: Loop
    loop.desc: Iterate over each element in the collection

  # Fields
  field:
    modelCode: Model
    modelCode.desc: Select the data model to operate on

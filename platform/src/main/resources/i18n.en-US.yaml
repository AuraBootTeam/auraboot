# Automation
automation:
  # Triggers
  trigger:
    recordCreate: On Record Create
    recordCreate.desc: Triggered when a record of the specified model is created
    recordUpdate: On Record Update
    recordUpdate.desc: Triggered when a record of the specified model is updated
    fieldChange: On Field Change
    fieldChange.desc: Triggered when the value of a specified field changes
    stateChange: On State Change
    stateChange.desc: Triggered when record state changes from one value to another
    scheduled: Scheduled
    scheduled.desc: Triggered according to Cron expression
    webhook: Webhook
    webhook.desc: Triggered when an external Webhook request is received

  # Actions
  action:
    updateRecord: Update Record
    updateRecord.desc: Update fields of a record in the specified model
    createRecord: Create Record
    createRecord.desc: Create a new record in the specified model
    sendNotification: Send Notification
    sendNotification.desc: Send notification to specified users
    executeCommand: Execute Command
    executeCommand.desc: Execute a specified system command
    callApi: Call API
    callApi.desc: Call an external HTTP API
    sendWebhook: Send Webhook
    sendWebhook.desc: Send a Webhook request to specified URL

  # Controls
  control:
    condition: Condition
    condition.desc: Determine execution path based on condition expression
    delay: Delay
    delay.desc: Wait for specified time before continuing
    loop: Loop
    loop.desc: Iterate over each element in the collection

  # Fields
  field:
    modelCode: Model
    modelCode.desc: Select the data model to operate on
    fieldCode: Field
    watchFields: Watch Fields
    watchFields.desc: Leave empty to watch all fields
    stateField: State Field
    fromValue: From Value
    fromValue.desc: Leave empty for any original value
    toValue: To Value
    toValue.desc: Leave empty for any target value
    fromStates: From States
    fromStates.desc: Leave empty for any original state
    toStates: To States
    toStates.desc: Leave empty for any target state
    cron: Cron Expression
    cron.desc: 'Example: 0 0 * * * (daily at midnight)'
    timezone: Timezone
    secret: Secret
    secret.desc: Secret key for validating request signatures
    validationMode: Validation Mode
    validationMode.none: No Validation
    validationMode.signature: Signature Validation
    validationMode.token: Token Validation
    recordId: Record ID
    recordId.desc: Supports expression reference, e.g., ${trigger.recordId}
    updateFields: Update Fields
    updateFields.desc: Fields and values to update, in JSON format
    createFields: Record Fields
    createFields.desc: Fields and values for new record, in JSON format
    notificationType: Notification Type
    notificationType.email: Email
    notificationType.sms: SMS
    notificationType.push: Push
    notificationType.inApp: In-App Message
    notificationTitle: Notification Title
    notificationContent: Notification Content
    recipients: Recipients
    recipients.desc: Supports expression reference for user IDs or emails
    commandCode: Command Code
    commandCode.desc: Identifier of the command to execute
    commandParams: Command Parameters
    commandParams.desc: Parameters to pass to the command, in JSON format
    apiUrl: API URL
    httpMethod: HTTP Method
    httpHeaders: HTTP Headers
    httpBody: HTTP Body
    webhookUrl: Webhook URL
    webhookPayload: Request Payload
    expression: Condition Expression
    expression.desc: Expression that returns true or false
    duration: Duration
    duration.desc: The time value to wait
    unit: Time Unit
    unit.seconds: Seconds
    unit.minutes: Minutes
    unit.hours: Hours
    unit.days: Days
    collection: Collection
    collection.desc: Array or list to iterate over
    itemVariable: Item Variable Name
    itemVariable.desc: Variable name for current element, default is item


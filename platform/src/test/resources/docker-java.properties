# docker-java configuration for TestContainers on Docker Desktop 29+.
# Docker Desktop 29 raised its minimum API from 1.32 to 1.44.
# docker-java 3.4.x still defaults to requesting v1.32, which now returns HTTP 400.
# Setting api.version here makes the shaded docker-java client negotiate v1.47,
# which is accepted by Docker Desktop 29.1+ running on this machine.
api.version=1.47

# ─── JUnit 5 Parallel Execution ───
# Integration tests use @Transactional + @Rollback(true) with a shared real PostgreSQL.
# Running tests concurrently causes DuplicateKeyException because one test's uncommitted
# INSERT conflicts with another test's INSERT on the same unique column.
# Sequential execution ensures each transaction completes (rolls back) before the next test runs.
junit.jupiter.execution.parallel.enabled = false
